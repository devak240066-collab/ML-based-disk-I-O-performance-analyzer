version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: diskio-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: disk_io_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: diskio-server
    restart: unless-stopped
    environment:
      PORT: 3001
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: root123
      DB_NAME: disk_io_db
    depends_on:
      - mysql
    ports:
      - "3001:3001"

  client:
    build:
      context: .
      dockerfile: Dockerfile.client
    container_name: diskio-client
    restart: unless-stopped
    depends_on:
      - server
    environment:
      # used only at build-time via Vite proxy (API is on same host)
      VITE_API_BASE_URL: http://localhost:3001
    ports:
      - "5173:80"

volumes:
  mysql_data:

